name: iicpc

x-node-service: &node-service
  image: node:22-bookworm
  working_dir: /workspace
  volumes:
    - .:/workspace
    - pnpm-store:/workspace/.pnpm-store
  environment:
    COREPACK_HOME: /workspace/.corepack
    PNPM_HOME: /workspace/.pnpm-home
    DATABASE_URL: postgres://postgres:postgres@timescaledb:5432/iicpc
    MESSAGE_TRANSPORT: kafka
    ORCHESTRATOR: docker-compose
    CI: "true"
  depends_on:
    timescaledb:
      condition: service_healthy

x-rust-service: &rust-service
  image: rust:1.85-bookworm
  working_dir: /workspace
  volumes:
    - .:/workspace
    - cargo-cache:/usr/local/cargo/registry
    - target-cache:/workspace/target
  environment:
    KAFKA_BROKERS: kafka:9092
    DATABASE_URL: postgres://postgres:postgres@timescaledb:5432/iicpc
    RUST_LOG: info
  depends_on:
    kafka-init:
      condition: service_completed_successfully
    timescaledb:
      condition: service_healthy

services:
  kafka:
    image: confluentinc/cp-kafka:7.7.2
    hostname: kafka
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://kafka:9092,CONTROLLER://kafka:9093,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server kafka:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 12

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: iicpc
    volumes:
      - timescale-data:/var/lib/postgresql/data
      - ./infrastructure/kubernetes/timescale/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d iicpc"]
      interval: 5s
      timeout: 5s
      retries: 20

  kafka-init:
    image: confluentinc/cp-kafka:7.7.2
    depends_on:
      kafka:
        condition: service_healthy
    restart: "no"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Creating Kafka topics..."
        for topic in submissions sys.market_data.live stage1.technical.out stage2.fundamental.out stage3.sentiment.out stage4.execution.out stage5.paper_trading.out sys.telemetry.metrics leaderboard-updates; do
          kafka-topics --bootstrap-server kafka:9092 --create --topic $$topic --partitions 4 --replication-factor 1 --if-not-exists
        done
        echo "All topics created:"
        kafka-topics --bootstrap-server kafka:9092 --list

  api-gateway:
    <<: *rust-service
    ports:
      - "8080:8080"
    command: sh -c "apt-get update && apt-get install -y --no-install-recommends cmake pkg-config libssl-dev && cargo run -p api-gateway"

  technical-agents:
    <<: *rust-service
    command: sh -c "apt-get update && apt-get install -y --no-install-recommends cmake pkg-config libssl-dev && cargo run -p technical-agents"
    environment:
      KAFKA_BROKERS: kafka:9092
      DATABASE_URL: postgres://postgres:postgres@timescaledb:5432/iicpc
      PORT: 8081

  fundamental-agents:
    <<: *rust-service
    command: sh -c "apt-get update && apt-get install -y --no-install-recommends cmake pkg-config libssl-dev && cargo run -p fundamental-agents"
    environment:
      KAFKA_BROKERS: kafka:9092
      DATABASE_URL: postgres://postgres:postgres@timescaledb:5432/iicpc
      PORT: 8082

  sentiment-agents:
    <<: *rust-service
    command: sh -c "apt-get update && apt-get install -y --no-install-recommends cmake pkg-config libssl-dev && cargo run -p sentiment-agents"
    environment:
      KAFKA_BROKERS: kafka:9092
      DATABASE_URL: postgres://postgres:postgres@timescaledb:5432/iicpc
      PORT: 8083

  execution-sim:
    <<: *rust-service
    command: sh -c "apt-get update && apt-get install -y --no-install-recommends cmake pkg-config libssl-dev && cargo run -p execution-sim"
    environment:
      KAFKA_BROKERS: kafka:9092
      DATABASE_URL: postgres://postgres:postgres@timescaledb:5432/iicpc
      PORT: 8084

  paper-trading:
    <<: *rust-service
    command: sh -c "apt-get update && apt-get install -y --no-install-recommends cmake pkg-config libssl-dev && cargo run -p paper-trading"
    environment:
      KAFKA_BROKERS: kafka:9092
      DATABASE_URL: postgres://postgres:postgres@timescaledb:5432/iicpc
      PORT: 8085

  telemetry-judge:
    <<: *rust-service
    command: sh -c "apt-get update && apt-get install -y --no-install-recommends cmake pkg-config libssl-dev && cargo run -p telemetry-judge"
    environment:
      KAFKA_BROKERS: kafka:9092
      DATABASE_URL: postgres://postgres:postgres@timescaledb:5432/iicpc
      PORT: 8086

  api-server:
    <<: *node-service
    ports:
      - "3001:3001"
    environment:
      COREPACK_HOME: /workspace/.corepack
      PNPM_HOME: /workspace/.pnpm-home
      DATABASE_URL: postgres://postgres:postgres@timescaledb:5432/iicpc
      MESSAGE_TRANSPORT: kafka
      ORCHESTRATOR: docker-compose
      CI: "true"
      PORT: 3001
      CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY:-}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-pk_test_local_auth_mocking_key_123}
      RUST_PIPELINE_URL: http://api-gateway:8080
    depends_on:
      timescaledb:
        condition: service_healthy
      api-gateway:
        condition: service_started
    command: sh -c "corepack enable && pnpm install --frozen-lockfile && pnpm --filter @workspace/db push --force && pnpm --filter @workspace/api-server dev"

  frontend:
    <<: *node-service
    ports:
      - "3000:3000"
    environment:
      COREPACK_HOME: /workspace/.corepack
      PNPM_HOME: /workspace/.pnpm-home
      CI: "true"
      PORT: 3000
      BASE_PATH: /
      VITE_API_URL: http://localhost:3001
      VITE_RUST_API_URL: http://localhost:8080
      VITE_CLERK_PUBLISHABLE_KEY: ${VITE_CLERK_PUBLISHABLE_KEY:-pk_test_bW9jay1hdXRoLWtleS0xMi5jbGVyay5hY2NvdW50cy5kZXYk}
      VITE_CLERK_PROXY_URL: ${VITE_CLERK_PROXY_URL:-}
    depends_on:
      api-server:
        condition: service_started
    command: sh -c "corepack enable && pnpm install --frozen-lockfile && pnpm --filter @workspace/iicpc-platform dev"

volumes:
  timescale-data:
  pnpm-store:
  cargo-cache:
  target-cache:
