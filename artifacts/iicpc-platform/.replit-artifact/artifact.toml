kind = "web"
previewPath = "/"
title = "IICPC Benchmarking Platform"
version = "1.0.0"
id = "artifacts/iicpc-platform"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19508

[services.development]
run = "pnpm --filter @workspace/iicpc-platform run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/iicpc-platform", "run", "build" ]
publicDir = "artifacts/iicpc-platform/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19508"
BASE_PATH = "/"
