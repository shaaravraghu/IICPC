apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: iicpc-api
  namespace: iicpc-platform
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/websocket-services: api-gateway
spec:
  ingressClassName: nginx
  rules:
    - host: iicpc.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  name: http
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  name: http
