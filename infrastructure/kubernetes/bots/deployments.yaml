apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: iicpc-platform
  labels:
    app: api-gateway
    app.kubernetes.io/part-of: iicpc
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
        app.kubernetes.io/part-of: iicpc
    spec:
      serviceAccountName: iicpc-platform
      containers:
        - name: api-gateway
          image: iicpc/api-gateway:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: KAFKA_BROKERS
              value: iicpc-kafka-kafka-bootstrap:9092
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: iicpc-service-secrets
                  key: database-url
            - name: RUST_LOG
              value: info
            - name: DEFAULT_ASSETS
              value: AAPL,MSFT,NVDA,AMZN,GOOGL,META,TSLA,AMD,AVGO,JPM
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          volumeMounts:
            - name: platform-config
              mountPath: /app/config
              readOnly: true
      volumes:
        - name: platform-config
          configMap:
            name: iicpc-platform-config
---
