apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: technical-agents
  namespace: iicpc-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: technical-agents
  minReplicas: 3
  maxReplicas: 12
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
